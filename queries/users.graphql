query GetUser($id: String!) {
  user(id: $id) {
    id
    name
    email
    displayName
    createdAt
    updatedAt
    admin
    active
    avatarUrl
  }
}

query ListUsers($first: Int, $after: String) {
  users(first: $first, after: $after) {
    nodes {
      id
      name
      email
      displayName
      createdAt
      admin
      active
      avatarUrl
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListUsersFiltered($first: Int, $after: String, $filter: UserFilter) {
  users(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      name
      email
      displayName
      createdAt
      admin
      active
      avatarUrl
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
