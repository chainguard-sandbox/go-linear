query GetTeam($id: String!) {
  team(id: $id) {
    id
    name
    key
    description
    createdAt
    updatedAt
    private
    timezone
    icon
    color
    issueCount
  }
}

query ListTeams($first: Int, $after: String) {
  teams(first: $first, after: $after) {
    nodes {
      id
      name
      key
      description
      createdAt
      private
      icon
      color
      issueCount
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListTeamsFiltered($first: Int, $after: String, $filter: TeamFilter) {
  teams(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      name
      key
      description
      createdAt
      private
      icon
      color
      issueCount
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListTeamMemberships($teamId: String!, $first: Int, $after: String) {
  team(id: $teamId) {
    id
    name
    key
    memberships(first: $first, after: $after) {
      nodes {
        id
        owner
        createdAt
        user {
          id
          name
          email
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
