query GetIssue($id: String!) {
  issue(id: $id) {
    id
    identifier
    title
    description
    priority
    estimate
    createdAt
    updatedAt
    number
    url
    parent {
      id
      identifier
    }
    state {
      id
      name
      type
    }
    team {
      id
      name
      key
    }
    assignee {
      id
      name
      displayName
    }
  }
}

query ListIssues($first: Int, $after: String) {
  issues(first: $first, after: $after) {
    nodes {
      id
      identifier
      title
      description
      priority
      createdAt
      updatedAt
      number
      url
      state {
        id
        name
      }
      team {
        id
        name
        key
      }
      assignee {
        id
        name
        displayName
        email
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
