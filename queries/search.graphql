query SearchIssues($term: String!, $first: Int, $after: String, $filter: IssueFilter, $includeArchived: Boolean) {
  searchIssues(term: $term, first: $first, after: $after, filter: $filter, includeArchived: $includeArchived) {
    nodes {
      id
      title
      description
      priority
      number
      createdAt
      url
      state {
        id
        name
      }
      team {
        id
        name
        key
      }
      assignee {
        id
        name
        email
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
    totalCount
  }
}
