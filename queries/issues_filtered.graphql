query ListIssuesFiltered($first: Int, $after: String, $filter: IssueFilter) {
  issues(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      identifier
      title
      description
      priority
      createdAt
      updatedAt
      number
      url
      trashed
      archivedAt
      state {
        id
        name
      }
      team {
        id
        name
        key
      }
      assignee {
        id
        name
        displayName
        email
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
