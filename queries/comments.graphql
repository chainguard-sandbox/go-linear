query GetComment($id: String!, $childrenLimit: Int, $childrenAfter: String) {
  comment(id: $id) {
    id
    body
    createdAt
    updatedAt
    url
    user {
      id
      name
    }
    issue {
      id
      title
    }
    parent {
      id
      body
      user {
        id
        name
      }
    }
    children(first: $childrenLimit, after: $childrenAfter) {
      nodes {
        id
        body
        user {
          id
          name
        }
        createdAt
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query ListComments($first: Int, $after: String) {
  comments(first: $first, after: $after) {
    nodes {
      id
      body
      createdAt
      updatedAt
      url
      user {
        id
        name
        email
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListCommentsFiltered($first: Int, $after: String, $filter: CommentFilter) {
  comments(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      body
      createdAt
      updatedAt
      url
      user {
        id
        name
        email
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}
