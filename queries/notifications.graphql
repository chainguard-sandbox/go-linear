query ListNotifications($first: Int, $after: String, $filter: NotificationFilter) {
  notifications(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      type
      createdAt
      readAt
      snoozedUntilAt
      archivedAt
      user {
        id
        name
      }
      actor {
        id
        name
      }
      ... on IssueNotification {
        issue {
          id
          identifier
          title
        }
        comment {
          id
          body
        }
      }
      ... on ProjectNotification {
        project {
          id
          name
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query GetNotification($id: String!) {
  notification(id: $id) {
    id
    type
    createdAt
    readAt
    snoozedUntilAt
    archivedAt
    user {
      id
      name
    }
    actor {
      id
      name
    }
    ... on IssueNotification {
      issue {
        id
        identifier
        title
      }
      comment {
        id
        body
      }
    }
    ... on ProjectNotification {
      project {
        id
        name
      }
    }
    ... on InitiativeNotification {
      initiative {
        id
        name
      }
    }
  }
}
