query GetInitiative($id: String!) {
  initiative(id: $id) {
    id
    name
    description
    createdAt
    updatedAt
    targetDate
    sortOrder
    color
    icon
    status
    health
    healthUpdatedAt
    url
    parentInitiative {
      id
      name
    }
    owner {
      id
      name
      email
    }
    projects(first: 10) {
      nodes {
        id
        name
        state
        progress
      }
    }
  }
}

query ListInitiatives($first: Int, $after: String) {
  initiatives(first: $first, after: $after) {
    nodes {
      id
      name
      description
      createdAt
      targetDate
      sortOrder
      color
      icon
      status
      health
      parentInitiative {
        id
        name
      }
      owner {
        id
        name
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListInitiativesFiltered($first: Int, $after: String, $filter: InitiativeFilter) {
  initiatives(first: $first, after: $after, filter: $filter) {
    nodes {
      id
      name
      description
      createdAt
      targetDate
      sortOrder
      color
      icon
      status
      health
      parentInitiative {
        id
        name
      }
      owner {
        id
        name
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

query ListSubInitiatives($id: String!, $first: Int, $after: String) {
  initiative(id: $id) {
    id
    subInitiatives(first: $first, after: $after) {
      nodes {
        id
        name
        description
        status
        health
        targetDate
        createdAt
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
