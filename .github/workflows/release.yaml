name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}

          # Build matrix
          platforms=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )

          mkdir -p dist

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="dist/go-linear-${VERSION}-${GOOS}-${GOARCH}"

            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi

            echo "Building ${GOOS}/${GOARCH}..."
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="-s -w -buildid= \
                -X github.com/chainguard-sandbox/go-linear/pkg/linear.Version=${VERSION} \
                -X github.com/chainguard-sandbox/go-linear/pkg/linear.GitCommit=${GITHUB_SHA} \
                -X github.com/chainguard-sandbox/go-linear/pkg/linear.GitTreeState=clean \
                -X github.com/chainguard-sandbox/go-linear/pkg/linear.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              -o "$output" \
              ./cmd/linear
          done

          # Create checksums
          cd dist
          sha256sum go-linear-* > checksums.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          PRERELEASE=""
          if [[ "$VERSION" == *"-"* ]]; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            $PRERELEASE \
            dist/go-linear-* \
            dist/checksums.txt
