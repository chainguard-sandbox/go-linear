repos:
  - repo: local
    hooks:
      - id: gitleaks
        name: Scan for secrets
        entry: gitleaks protect --staged
        language: system
        pass_filenames: false

      - id: go-fmt
        name: Check Go formatting
        entry: make checkfmt
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-vet
        name: Run go vet
        entry: make vet
        language: system
        pass_filenames: false
        files: \.go$

      - id: golangci-lint
        name: Run golangci-lint
        entry: make lint
        language: system
        pass_filenames: false
        files: \.go$

      - id: go-mod-tidy
        name: Verify go.mod is tidy
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false
        files: (go\.mod|go\.sum)$
