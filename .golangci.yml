# golangci-lint configuration
# Documentation: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  # Timeout for analysis
  timeout: 5m

  # Exit code when at least one issue was found
  issues-exit-code: 1

  # Include test files
  tests: true

linters:
  # Default mode: standard (can be: all, none, standard, fast)
  default: none

  # Enable specific linters
  enable:
    # Core linters (high value, low false positives)
    - staticcheck    # Most important static analysis tool
    - gosec          # Security vulnerabilities
    - gocritic       # Performance and style checks
    - errorlint      # Error handling best practices

    # Code quality
    - misspell       # Spelling mistakes in comments
    - unparam        # Detect unused function parameters
    - unconvert      # Unnecessary type conversions
    - whitespace     # Whitespace issues
    - prealloc       # Slice preallocation

    # HTTP and resource handling
    - bodyclose      # HTTP response body must be closed

    # Testing
    - tparallel      # Detects inappropriate usage of t.Parallel()

    # Modernization
    - modernize      # Suggests modern Go features

    # Additional checks
    - asciicheck     # Non-ASCII identifiers
    - bidichk        # Dangerous unicode characters
    - durationcheck  # Duration multiplication
    - errname        # Error naming conventions
    - nilerr         # Return nil even if err != nil

    # Forbidden patterns
    - forbidigo      # Forbid specific function calls (e.g., print statements)

  # Linter-specific settings
  settings:
    # gosec configuration
    gosec:
      # Exclude specific rules
      excludes:
        - G115  # Integer overflow - we handle this manually when needed

    # forbidigo: forbid specific function calls
    forbidigo:
      # Forbid the following patterns
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: "Use structured logging (slog) instead of fmt.Print"
        - pattern: ^print$
          msg: "Use structured logging (slog) instead of print"
        - pattern: ^println$
          msg: "Use structured logging (slog) instead of println"
      # Allow these in test files
      analyze-types: false

    # staticcheck configuration
    staticcheck:
      checks: ["all"]

    # gocritic configuration
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental
        - opinionated
      disabled-checks:
        - hugeParam        # Sometimes large structs are passed
        - rangeValCopy     # Sometimes acceptable
        - unnamedResult    # Named results not always needed

    # misspell configuration
    misspell:
      locale: US

    # errorlint configuration
    errorlint:
      # Check for fmt.Errorf with %w verb
      errorf: true
      # Check for errors.As() and errors.Is() usage
      asserts: true
      # Check for error comparison
      comparison: true

  # Exclusions (paths and rules)
  exclusions:
    # Exclude directories from linting
    paths:
      - "examples/tasks/.*"
      - "examples/mcp-client/.*"

    # Exclude linters from specific files
    rules:
      # Exclude linters from generated files (genqlient)
      - path: "internal/graphql/generated\\.go"
        linters:
          - staticcheck
          - gosec
          - gocritic
          - errorlint
          - unparam
          - misspell
          - whitespace

formatters:
  # Enable specific formatters
  enable:
    - gofmt          # Standard Go formatter
    - goimports      # Manages imports and formatting
    - gci            # Import organization

  # Formatter-specific settings
  settings:
    # gci configuration (import order)
    gci:
      sections:
        - standard  # Standard library
        - default   # Everything else
        - prefix(github.com/chainguard-sandbox/go-linear)  # This project

issues:
  # Maximum issues count per one linter
  # Set to 0 to disable limit
  max-issues-per-linter: 0

  # Maximum count of issues with the same text
  # Set to 0 to disable limit
  max-same-issues: 0

# Output configuration
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: true
